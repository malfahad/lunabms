# Cross-platform CI (Milestone 0): same scripts on Linux, Windows, and macOS runners.
# Native Android/iOS binaries are built locally or via EAS; this workflow validates JS + web export.

name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-test-web:
    name: ${{ matrix.os }} — core tests + Expo web export
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Test @servops/core
        run: npm run test -w @servops/core

      - name: Export web (Metro static)
        run: npm run export:web -w @servops/fieldops
