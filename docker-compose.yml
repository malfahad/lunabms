services:
  api:
    build:
      context: ./backend/api
    command: sh -c "python manage.py migrate && python manage.py runserver 0.0.0.0:8000"
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    environment:
      # Keep DB host pinned to docker network service name.
      DATABASE_URL: "postgresql://lunabms:lunabms@db:5432/lunabms"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/api:/app

  db:
    image: postgres:16
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: lunabms
      POSTGRES_USER: lunabms
      POSTGRES_PASSWORD: lunabms
    volumes:
      - lunabms_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lunabms -d lunabms"]
      interval: 2s
      timeout: 5s
      retries: 20

volumes:
  lunabms_pg_data:
